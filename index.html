<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>拍照识字 & 实时翻译</title>
    <style>
        :root {
            --primary-color: #3b82f6;
            --primary-hover: #2563eb;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            padding: 16px;
            max-width: 600px;
            margin: 0 auto;
        }

        .container {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        h1 {
            font-size: 20px;
            text-align: center;
            margin: 8px 0;
            color: var(--text-main);
        }

        .camera-section {
            background: var(--card-bg);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            position: relative;
            aspect-ratio: 4 / 3;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 2px dashed #cbd5e1;
        }

        #video, #photo {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        .placeholder-text {
            color: var(--text-muted);
            font-size: 14px;
            text-align: center;
            padding: 20px;
        }

        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 14px 16px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 2px 4px rgba(59, 130, 246, 0.2);
        }

        button:active {
            background-color: var(--primary-hover);
            transform: scale(0.98);
        }

        button.secondary {
            background-color: #64748b;
            box-shadow: 0 2px 4px rgba(100, 116, 139, 0.2);
        }
        button.secondary:active {
            background-color: #475569;
        }

        #action-btn {
            grid-column: span 2;
            background-color: #10b981;
            box-shadow: 0 2px 4px rgba(16, 185, 129, 0.2);
        }
        #action-btn:active {
            background-color: #059669;
        }
        #action-btn:disabled {
            background-color: #cbd5e1;
            color: #94a3b8;
            box-shadow: none;
            cursor: not-allowed;
        }

        .result-section {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            display: none;
        }

        .section-title {
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        /* 卡拉OK 看板核心样式 */
        .pinyin-board {
            display: flex;
            flex-wrap: wrap;
            gap: 12px 16px;
            margin-bottom: 20px;
            padding: 12px;
            background: #f8fafc;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
        }

        .word-group {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
        }

        .pinyin {
            font-size: 12px;
            color: #ef4444;
            font-weight: 500;
            height: 18px;
        }

        .hanzi {
            font-size: 22px;
            font-weight: bold;
            color: var(--text-main);
        }

        /* 释义大字区样式 */
        .translation-box {
            font-size: 20px;
            font-weight: 600;
            color: #0f172a;
            padding: 14px;
            background: #f0fdf4;
            border-left: 4px solid #10b981;
            border-radius: 0 8px 8px 0;
            min-height: 50px;
        }

        .peek-btn {
            grid-column: span 2;
            background-color: #3b82f6;
            user-select: none;
            -webkit-user-select: none;
        }

        #canvas {
            display: none;
        }

        .loading-spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid white;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            animation: spin 0.8s linear infinite;
            display: none;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
    <script src="https://unpkg.com/pinyin-pro@3.18.3/dist/index.prod.js"></script>
</head>
<body>

    <div class="container">
        <h1>📸 智能拍照识字工具</h1>

        <div class="camera-section" id="camera-container">
            <div class="placeholder-text" id="placeholder">点击“打开摄像头”或“传本地图”开始</div>
            <video id="video" autoplay playsinline></video>
            <img id="photo" alt="拍摄快照">
            <canvas id="canvas"></canvas>
        </div>

        <div class="btn-group">
            <button class="secondary" id="open-cam-btn">📷 打开摄像头</button>
            <button class="secondary" id="file-btn">🖼️ 传本地图</button>
            <input type="file" id="file-input" accept="image/*" style="display: none;">
            
            <button id="action-btn" disabled>
                <div class="loading-spinner" id="spinner"></div>
                <span id="btn-text">🔍 仅识别文字</span>
            </button>
        </div>

        <div class="result-section" id="result-panel">
            <div class="section-title">拼音看板 (点击单字可朗读)</div>
            <div class="pinyin-board" id="pinyin-board-container"></div>

            <div class="section-title">越南语翻译 (Translation)</div>
            <div class="translation-box" id="translation-result"></div>

            <div class="btn-group" style="margin-top: 16px;">
                <button class="peek-btn" id="peek-btn">👆 按住看翻译 (Peek)</button>
            </div>
        </div>
    </div>

    <script>
        // 🎯 完美对齐的 Supabase 生产公网网关地址
        const backendUrl = `https://nqzqnrpdwpoxexavqgvo.supabase.co/functions/v1/process-image`;
        
        // 🔒 写入你提供的安全公用 Anon 护照密钥
        const supabaseAnonKey = `eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5xenFucnBkd3BveGV4YXZxZ3ZvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg4ODk0NDcsImV4cCI6MjA5NDQ2NTQ0N30.WekEdgX2T0Ea8SA1ot07XN5nSDumtlylHiRyf6GGwE0`;

        const video = document.getElementById('video');
        const photo = document.getElementById('photo');
        const canvas = document.getElementById('canvas');
        const placeholder = document.getElementById('placeholder');
        const openCamBtn = document.getElementById('open-cam-btn');
        const fileBtn = document.getElementById('file-btn');
        const fileInput = document.getElementById('file-input');
        const actionBtn = document.getElementById('action-btn');
        const spinner = document.getElementById('spinner');
        const btnText = document.getElementById('btn-text');
        const resultPanel = document.getElementById('result-panel');
        const pinyinBoardContainer = document.getElementById('pinyin-board-container');
        const translationResult = document.getElementById('translation-result');
        const peekBtn = document.getElementById('peek-btn');

        let stream = null;
        let base64Data = null;
        let globalTranslation = ""; 

        // 1. 唤醒摄像头
        openCamBtn.addEventListener('click', async () => {
            try {
                if(stream) {
                    stream.getTracks().forEach(track => track.stop());
                }
                photo.style.display = 'none';
                placeholder.style.display = 'none';
                video.style.display = 'block';

                stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment' },
                    audio: false
                });
                video.srcObject = stream;
                actionBtn.disabled = false;
                openCamBtn.textContent = "🔄 重新拍照";
            } catch (err) {
                alert('摄像头开启失败，请检查权限或尝试使用“传本地图”功能');
                console.error(err);
            }
        });

        // 2. 传本地图逻辑
        fileBtn.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            if(stream) {
                stream.getTracks().forEach(track => track.stop());
                stream = null;
            }

            const reader = new FileReader();
            reader.onload = (event) => {
                video.style.display = 'none';
                placeholder.style.display = 'none';
                photo.style.display = 'block';
                photo.src = event.target.result;
                
                base64Data = event.target.result.replace(/^data:image\/\w+;base64,/, "");
                actionBtn.disabled = false;
            };
            reader.readAsDataURL(file);
        });

        // 3. 核心请求逻辑：向大模型发起总攻
        actionBtn.addEventListener('click', async () => {
            // 如果是在视频流状态下，先定格画面切成图片
            if (stream && video.style.display !== 'none') {
                const ctx = canvas.getContext('2d');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                
                const dataUrl = canvas.toDataURL('image/jpeg', 0.8);
                video.style.display = 'none';
                photo.style.display = 'block';
                photo.src = dataUrl;
                
                base64Data = dataUrl.replace(/^data:image\/\w+;base64,/, "");
                stream.getTracks().forEach(track => track.stop());
                stream = null;
            }

            if (!base64Data) {
                alert("请先拍照或选择图片");
                return;
            }

            // 开启 Loading 动画
            actionBtn.disabled = true;
            spinner.style.display = 'block';
            btnText.textContent = '正在识别并翻译...';
            resultPanel.style.display = 'none';

            try {
                // 向新加坡 Supabase 节点发送 POST 并塞入公共护照
                const response = await fetch(backendUrl, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "apikey": supabaseAnonKey,
                        "Authorization": `Bearer ${supabaseAnonKey}`
                    },
                    body: JSON.stringify({ image: base64Data })
                });

                if (!response.ok) {
                    const errDetail = await response.text();
                    throw new Error(errDetail || `HTTP 错误 ${response.status}`);
                }

                const result = await response.json();
                
                if(result.error) {
                    throw new Error(result.error);
                }

                // 渲染最终结果
                renderPinyinBoard(result.text);
                globalTranslation = result.translation || "无对应翻译";
                translationResult.textContent = "*** (已隐藏，请按住下方 Peek 按钮查看)";
                
                resultPanel.style.display = 'block';
                resultPanel.scrollIntoView({ behavior: 'smooth' });

            } catch (err) {
                alert("识字失败: " + err.message);
                console.error(err);
            } finally {
                actionBtn.disabled = false;
                spinner.style.display = 'none';
                btnText.textContent = '🔍 仅识别文字';
            }
        });

        // 4. 卡拉OK 看板渲染引擎
        function renderPinyinBoard(text) {
            pinyinBoardContainer.innerHTML = "";
            if(!text) return;

            // 过滤掉中英文常见标点，仅对汉字生成拼音
            const cleanText = text.replace(/[\s,.:;!?，。：；！？、]/g, "");

            for (let char of cleanText) {
                const group = document.createElement('div');
                group.className = 'word-group';

                const pinyinText = pinyinPro.pinyin(char, { toneType: 'symbol' });

                const pinyinDiv = document.createElement('div');
                pinyinDiv.className = 'pinyin';
                pinyinDiv.textContent = pinyinText;

                const hanziDiv = document.createElement('div');
                hanziDiv.className = 'hanzi';
                hanziDiv.textContent = char;

                group.appendChild(pinyinDiv);
                group.appendChild(hanziDiv);

                // 点击单字发音
                group.addEventListener('click', () => {
                    speakChinese(char);
                });

                pinyinBoardContainer.appendChild(group);
            }
        }

        // 5. 语音发音逻辑 (Web Speech API)
        function speakChinese(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel(); // 强行切断上一声，做到即点即发音
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'zh-CN';
                utterance.rate = 0.8; // 降低语速，方便精细听读音
                window.speechSynthesis.speak(utterance);
            }
        }

        // 6. 核心交互：Peek 按住看翻译逻辑 (完美适配手机触摸端与电脑鼠标)
        function showTranslation() {
            translationResult.textContent = globalTranslation;
            translationResult.style.background = "#e8f5e9";
        }

        function hideTranslation() {
            translationResult.textContent = "*** (已隐藏，请按住下方 Peek 按钮查看)";
            translationResult.style.background = "#f0fdf4";
        }

        // 手机触摸事件
        peekBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            showTranslation();
        });
        peekBtn.addEventListener('touchend', () => {
            hideTranslation();
        });

        // 电脑鼠标事件
        peekBtn.addEventListener('mousedown', () => {
            showTranslation();
        });
        peekBtn.addEventListener('mouseup', () => {
            hideTranslation();
        });
        peekBtn.addEventListener('mouseleave', () => {
            hideTranslation();
        });

    </script>
</body>
</html>
